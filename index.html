<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>قلب سه‌بعدی با ۱۰۰ جمله</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Vazir', 'Segoe UI', Tahoma, sans-serif;
            background-color: #0a0a0a;
            color: white;
        }
        #sentence-box {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            padding: 18px 36px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 40px rgba(255, 0, 100, 0.25);
            font-size: 1.4rem;
            font-weight: 500;
            color: #fff;
            text-align: center;
            pointer-events: none;
            z-index: 20;
            min-width: 200px;
            max-width: 85%;
            letter-spacing: 0.3px;
            text-shadow: 0 0 25px rgba(255, 80, 150, 0.2);
            transition: all 0.4s ease;
        }
        #sentence-text {
            display: inline-block;
        }
        .sentence-pop {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0.3) rotate(-8deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        #hint {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.25);
            font-size: 0.85rem;
            background: rgba(255,255,255,0.04);
            padding: 8px 20px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
            z-index: 5;
            letter-spacing: 1px;
        }
        #counter {
            position: absolute;
            top: 100px;
            right: 20px;
            color: rgba(255,255,255,0.15);
            font-size: 0.8rem;
            background: rgba(0,0,0,0.3);
            padding: 6px 14px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
            z-index: 5;
        }
        @media (max-width: 600px) {
            #sentence-box { font-size: 1rem; padding: 12px 20px; min-width: 140px; top: 20px; }
            #counter { top: 80px; right: 10px; font-size: 0.7rem; padding: 4px 10px; }
        }
    </style>
</head>
<body>

    <div id="sentence-box">
        <span id="sentence-text">❤️ روی قلب کلیک کن</span>
    </div>
    <div id="counter">۰ از ۱۰۰</div>
    <div id="hint">✦ کلیک کن تا جمله‌ای تازه بخوانی ✦</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // --- صحنه، دوربین، رندرر ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- نورپردازی ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xff99cc, 1.2);
        mainLight.position.set(2, 3, 4);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const backLight = new THREE.DirectionalLight(0x4466ff, 0.8);
        backLight.position.set(-3, -1, -4);
        scene.add(backLight);
        const pointLight = new THREE.PointLight(0xff3366, 0.6, 10);
        pointLight.position.set(0, 1, 2);
        scene.add(pointLight);
        const fillLight = new THREE.HemisphereLight(0x442266, 0x222244, 0.7);
        scene.add(fillLight);

        // --- ساخت قلب سه‌بعدی ---
        const heartShape = new THREE.Shape();
        heartShape.moveTo(0, 0.3);
        heartShape.bezierCurveTo(0, 0.6, -0.6, 0.8, -0.6, 0.3);
        heartShape.bezierCurveTo(-0.6, -0.2, 0, -0.4, 0, -0.8);
        heartShape.bezierCurveTo(0, -0.4, 0.6, -0.2, 0.6, 0.3);
        heartShape.bezierCurveTo(0.6, 0.8, 0, 0.6, 0, 0.3);

        const extrudeSettings = {
            depth: 0.4,
            bevelEnabled: true,
            bevelSegments: 10,
            bevelSize: 0.08,
            bevelThickness: 0.15,
            bevelOffset: 0
        };

        const heartGeometry = new THREE.ExtrudeGeometry(heartShape, extrudeSettings);
        heartGeometry.computeBoundingBox();
        const center = new THREE.Vector3();
        heartGeometry.boundingBox.getCenter(center);
        heartGeometry.translate(-center.x, -center.y, -center.z);

        const material = new THREE.MeshPhysicalMaterial({
            color: 0xff2255,
            emissive: 0x881122,
            emissiveIntensity: 0.25,
            metalness: 0.3,
            roughness: 0.2,
            clearcoat: 0.6,
            clearcoatRoughness: 0.3,
            reflectivity: 0.7,
            side: THREE.DoubleSide,
        });

        const heart = new THREE.Mesh(heartGeometry, material);
        heart.castShadow = true;
        heart.receiveShadow = true;
        heart.scale.set(0.9, 0.9, 0.9);
        heart.rotation.x = -0.2;
        heart.rotation.y = 0.4;
        heart.rotation.z = 0.1;
        scene.add(heart);

        // --- ذرات زیبایی ---
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 600;
        const posArray = new Float32Array(particlesCount * 3);
        for (let i = 0; i < particlesCount * 3; i += 3) {
            const radius = 1.8 + Math.random() * 2.2;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI * 2;
            posArray[i] = Math.sin(theta) * Math.cos(phi) * radius;
            posArray[i+1] = Math.sin(theta) * Math.sin(phi) * radius * 0.8;
            posArray[i+2] = Math.cos(theta) * radius * 0.6;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            color: 0xff88aa,
            size: 0.03,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true,
        });
        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);

        // --- ===== لیست ۱۰۰ جمله ===== ---
        const sentences = [
            "عشق یعنی دیدن زیبایی‌ها در ساده‌ترین چیزها",
            "قلب تو پُر از نوری است که دنیا را روشن می‌کند",
            "هر روز با تو مثل یک رویای تازه است",
            "مهربانی تو، آرامش بی‌نهایت من است",
            "با تو بودن، بهترین نسخه از زندگیست",
            "چشمانت، دریچه‌ای به بهشت‌اند",
            "لبخندت، گرم‌تر از خورشید است",
            "دست‌هایت، امن‌ترین پناهگاه من",
            "صدایت، موسیقی آرامش‌بخش روح من",
            "تو معنی واقعی عشق را به من آموختی",
            "هر لحظه با تو، یک خاطره‌ی ماندگار",
            "زندگی با تو، رنگی‌ترین نقاشی‌ست",
            "تو قشنگ‌ترین اتفاق زندگی منی",
            "دل من فقط برای تو می‌تپد",
            "عشق تو، بزرگترین هدیه‌ی خداوند",
            "با تو، هر روز تولدی دوباره است",
            "نگاهت، شعر بی‌کلام عشق است",
            "تو رویای شیرین من در شب‌های بی‌خوابی",
            "حضورت، گرم‌ترین آفتاب زمستان",
            "عشق یعنی تو، فقط تو",
            "دل من وابسته به نگاه مهربانت",
            "تو نور چشمان منی",
            "زندگی بدون تو، بی‌معناست",
            "با تو، همه چیز زیبا می‌شود",
            "تو جذاب‌ترین ترانه‌ی قلب منی",
            "هر روز عاشق‌تر از دیروز",
            "تو آرامش بی‌نهایت منی",
            "دوستت دارم، بی‌نهایت",
            "عشق تو، معجزه‌ی زندگی من",
            "با تو، آسمان همیشه آبیست",
            "تو رویای دست‌یافتنی منی",
            "قلبم برای تو می‌زند",
            "تو زیباترین واژه‌ی قاموس عشق",
            "عشق یعنی بودن در کنار تو",
            "تو تمام دنیای منی",
            "حضورت، بهترین لحظات زندگی",
            "دلم تنگ است برای نگاهت",
            "تو معشوق منی، برای همیشه",
            "عشق تو، انرژی بی‌پایان من",
            "با تو، هر ثانیه بهشت است",
            "تو فرشته‌ی زمینی منی",
            "دل من، خانه‌ی عشق توست",
            "تو بهترین دوست و عاشقم",
            "زندگی با تو، یک ماجرای عاشقانه",
            "نگاهت، آرزوی همیشگی من",
            "تو قشنگ‌ترین رویای منی",
            "عشق تو، نغمه‌ی دلنواز زندگی",
            "با تو، همه چیز ممکن می‌شود",
            "تو گمشده‌ی من در ازدحام دنیا",
            "دوست داشتن تو، ساده‌ترین کار دنیاست",
            "تو ماه شب‌های تار منی",
            "عشق یعنی تو، یعنی من، یعنی ما",
            "با تو، دنیا جای بهتریست",
            "تو همیشه در قلب منی",
            "لبخندت، معجزه‌ی روزهایم",
            "تو نجیب‌ترین احساس منی",
            "دل من، اسیر عشق توست",
            "با تو، همه چیز رنگی می‌شود",
            "تو خورشید زندگی منی",
            "عشق تو، الهام‌بخش من است",
            "با تو، هر روز عاشقانه‌تر",
            "تو بهترین هدیه‌ی آسمانی",
            "دلم برای صدایت تنگ شده",
            "تو منحصر‌به‌فردی، مثل خودت",
            "عشق یعنی فداکاری برای تو",
            "با تو، آرامش پیدا می‌کنم",
            "تو رویای شیرین منی",
            "دوستت دارم، بی‌نهایت بار",
            "تو تمام آرزوهای منی",
            "زندگی با تو، یک فیلم عاشقانه",
            "نگاهت، نغمه‌ی دلنشین",
            "تو بهترین بخش زندگی منی",
            "عشق تو، جریان زندگی من",
            "با تو، همه چیز معنا دارد",
            "تو فرشته‌ی نجات منی",
            "دل من، مال توست",
            "تو زیباترین خاطره‌ی منی",
            "با تو، هر لحظه ارزشمند است",
            "عشق یعنی با تو بودن",
            "تو قوی‌ترین احساس منی",
            "دوستت دارم، بیشتر از هرچیز",
            "تو آرامش دلمی",
            "با تو، دنیا قشنگ‌تر است",
            "تو رویای همیشگی منی",
            "عشق تو، بزرگترین ثروت من",
            "با تو، همه چیز ممکن است",
            "تو بهترین اتفاق زندگی منی",
            "دل من، برای تو می‌تپد",
            "تو عشق اول و آخر منی",
            "با تو، زندگی زیباست",
            "تو ماه کامل شب‌های من",
            "عشق تو، جادوی زندگی من",
            "با تو، همیشه در بهشت‌ام",
            "تو تمام دنیای قشنگ منی",
            "دوستت دارم، بی‌پایان",
            "تو آرامش‌بخش دلمی",
            "با تو، هر روز نورانی‌ست",
            "عشق یعنی تو، فقط تو",
            "تو نهایت آرزوی منی",
            "با تو، قلبم پر از عشق است",
            "تو زیباترین تقدیر منی"
        ];

        // --- ===== منطق نمایش جملات (بدون باگ) ===== ---
        const sentenceElement = document.getElementById('sentence-text');
        const counterElement = document.getElementById('counter');
        let lastIndex = -1;
        let displayedCount = 0;

        function getRandomSentence() {
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * sentences.length);
            } while (randomIndex === lastIndex && sentences.length > 1);
            lastIndex = randomIndex;
            return sentences[randomIndex];
        }

        function showNewSentence() {
            // حذف کلاس افکت قبلی
            sentenceElement.classList.remove('sentence-pop');
            
            // تغییر متن
            const newSentence = getRandomSentence();
            sentenceElement.textContent = newSentence;
            
            // به‌روزرسانی شمارنده
            displayedCount++;
            counterElement.textContent = `${displayedCount} از ۱۰۰`;
            
            // اجرای دوباره انیمیشن با حذف و افزودن کلاس
            // این روش بدون کلون کردن کار می‌کند و مشکل قبلی را حل می‌کند
            void sentenceElement.offsetWidth; // نیروی ریفلوی مجدد
            sentenceElement.classList.add('sentence-pop');

            // افکت روی قلب
            heart.material.emissive.setHex(0xff4488);
            heart.material.emissiveIntensity = 0.8;
            setTimeout(() => {
                heart.material.emissive.setHex(0x881122);
                heart.material.emissiveIntensity = 0.25;
            }, 300);

            heart.rotation.y += 0.15;
            heart.rotation.x += 0.05;
        }

        // تنظیم اولیه
        sentenceElement.textContent = '❤️ روی قلب کلیک کن';
        setTimeout(() => {
            sentenceElement.classList.add('sentence-pop');
        }, 100);

        // --- تشخیص کلیک با Raycaster ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function onPointerDown(event) {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(heart);

            if (intersects.length > 0) {
                showNewSentence();
            }
        }

        renderer.domElement.addEventListener('click', onPointerDown);
        renderer.domElement.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                const touch = e.touches[0];
                onPointerDown({ clientX: touch.clientX, clientY: touch.clientY });
            }
        });

        // --- کنترل دوربین ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.8;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.target.set(0, 0, 0);
        controls.update();

        // --- انیمیشن ---
        function animate() {
            requestAnimationFrame(animate);

            particles.rotation.y += 0.0005;
            particles.rotation.x += 0.0002;

            const time = Date.now() * 0.001;
            const scale = 0.9 + Math.sin(time * 1.2) * 0.02;
            heart.scale.set(scale, scale, scale);

            pointLight.position.x = Math.sin(time * 0.4) * 1.2;
            pointLight.position.z = Math.cos(time * 0.3) * 1.2;

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('❤️ قلب آماده است! هر بار کلیک، جمله جدیدی نشان داده می‌شود.');
    </script>
</body>
</html>
